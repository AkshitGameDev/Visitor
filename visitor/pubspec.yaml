name: visitor
description: A Flutter app with backend integration
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9

  # State management
  get: ^4.7.2

  # Networking
  http: ^1.2.2
  dio: ^5.8.0+1

  # Local storage
  shared_preferences: ^2.5.3

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # JSON / utilities
  intl: ^0.20.2

  # UI helpers
  google_fonts: ^6.2.1
  flutter_svg: ^2.1.0
  cached_network_image: ^3.4.1

  # Loading / toast
  flutter_easyloading: ^3.0.5
  another_flushbar: ^1.12.30

  # Form validation
  email_validator: ^3.0.0

  # Routing / connectivity / logging
  connectivity_plus: ^6.1.4
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/